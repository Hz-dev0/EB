<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Journal</title>
<meta name="theme-color" content="#4F6EF7"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="經驗書"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
  getDocs, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCBDKAOWQxc7oQz5IOhYVeaWpgbItp_glI",
  authDomain: "lumos-c6ccc.firebaseapp.com",
  projectId: "lumos-c6ccc",
  storageBucket: "lumos-c6ccc.firebasestorage.app",
  messagingSenderId: "914721288327",
  appId: "1:914721288327:web:6539b1770c23f007858822"
};

const COLLECTION = "experience_journal";
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let allEntries = [];

// ── helpers ──────────────────────────────────────
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function hl(text, q){
  if(!q) return esc(text);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`, "gi");
  return esc(text).replace(re,'<mark>$1</mark>');
}

function setSyncing(on){
  const dot = document.getElementById("sync-dot");
  dot.className = on ? "sync-dot syncing" : "sync-dot";
}

// ── render ───────────────────────────────────────
function renderEntries(entries, q=""){
  const el = document.getElementById("entry-list");
  if(!entries.length){
    el.innerHTML = `<div class="empty">${q ? "找不到符合的記錄" : "打下第一條感想吧"}</div>`;
    return;
  }
  el.innerHTML = entries.map(e => `
    <div class="card" data-id="${e.id}">
      <div class="card-view">
        <div class="card-text">${hl(e.content, q)}</div>
        <div class="card-actions">
          <button class="btn-edit" data-id="${e.id}">編輯</button>
          <button class="btn-del" data-id="${e.id}">刪除</button>
        </div>
      </div>
      <div class="card-edit" style="display:none">
        <textarea class="inline-editor"></textarea>
        <div class="inline-actions">
          <button class="btn-save">儲存</button>
          <button class="btn-cancel">取消</button>
        </div>
      </div>
    </div>
  `).join("");

  el.querySelectorAll(".btn-edit").forEach(b => b.addEventListener("click", () => startInlineEdit(b.dataset.id)));
  el.querySelectorAll(".btn-del").forEach(b => b.addEventListener("click", () => delEntry(b.dataset.id)));
  el.querySelectorAll(".btn-save").forEach(b => b.addEventListener("click", () => saveInlineEdit(b.closest(".card").dataset.id)));
  el.querySelectorAll(".btn-cancel").forEach(b => b.addEventListener("click", () => cancelInlineEdit(b.closest(".card"))));
  el.querySelectorAll(".inline-editor").forEach(ta => {
    ta.addEventListener("keydown", e => {
      if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); saveInlineEdit(ta.closest(".card").dataset.id); }
      if(e.key === "Escape") cancelInlineEdit(ta.closest(".card"));
    });
    ta.addEventListener("input", () => autoResize(ta));
  });
}

function applyFilter(){
  const q = document.getElementById("search").value.trim();
  let res = allEntries;
  if(q){
    const terms = q.toLowerCase().split(/\s+/);
    res = res.filter(e => {
      const hay = (e.content||"").toLowerCase();
      return terms.every(t => hay.includes(t));
    });
  }
  renderEntries(res, q);
}

// ── data ops ─────────────────────────────────────
async function loadEntries(){
  const snap = await getDocs(query(collection(db,COLLECTION), orderBy("createdAt","desc")));
  allEntries = snap.docs.map(d=>({id:d.id,...d.data()}));
  applyFilter();
}

async function submitQuick(){
  const inp = document.getElementById("quick-input");
  const raw = inp.value.trim();
  if(!raw) return;
  inp.value = "";
  autoResize(inp);
  setSyncing(true);
  try {
    await addDoc(collection(db,COLLECTION),{
      content: raw,
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
    await loadEntries();
  } finally { setSyncing(false); }
}

function startInlineEdit(id){
  const e = allEntries.find(x=>x.id===id);
  if(!e) return;
  const card = document.querySelector(`.card[data-id="${id}"]`);
  const ta = card.querySelector(".inline-editor");
  ta.value = e.content || "";
  card.querySelector(".card-view").style.display = "none";
  card.querySelector(".card-edit").style.display = "block";
  autoResize(ta);
  ta.focus();
  // put cursor at end
  ta.selectionStart = ta.selectionEnd = ta.value.length;
}

async function saveInlineEdit(id){
  const card = document.querySelector(`.card[data-id="${id}"]`);
  const raw = card.querySelector(".inline-editor").value.trim();
  if(!raw) return;
  setSyncing(true);
  try {
    await updateDoc(doc(db,COLLECTION,id),{ content: raw, updatedAt: serverTimestamp() });
    await loadEntries();
  } finally { setSyncing(false); }
}

function cancelInlineEdit(card){
  card.querySelector(".card-view").style.display = "block";
  card.querySelector(".card-edit").style.display = "none";
}

async function delEntry(id){
  if(!confirm("刪除這條記錄？")) return;
  setSyncing(true);
  try {
    await deleteDoc(doc(db,COLLECTION,id));
    await loadEntries();
  } finally { setSyncing(false); }
}

function autoResize(el){
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

// ── auth ─────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if(user){
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user-avatar").src = user.photoURL || "";
    document.getElementById("user-avatar").title = user.displayName || user.email;
    try { await loadEntries(); }
    catch(err){
      if(err.code === "permission-denied"){
        await signOut(auth);
        document.getElementById("auth-error").textContent = "此帳號沒有存取權限。";
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("app").style.display = "none";
      } else {
        console.warn("loadEntries:", err.message);
      }
    }
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("google-login").addEventListener("click", async () => {
    document.getElementById("auth-error").textContent = "";
    try { await signInWithPopup(auth, provider); }
    catch(e){ document.getElementById("auth-error").textContent = "登入失敗：" + e.message; }
  });

  document.getElementById("logout-btn").addEventListener("click", () => signOut(auth));

  const inp = document.getElementById("quick-input");
  inp.addEventListener("input", () => autoResize(inp));
  inp.addEventListener("keydown", e => {
    if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); submitQuick(); }
  });

  document.getElementById("submit-btn").addEventListener("click", submitQuick);
  document.getElementById("search").addEventListener("input", applyFilter);
});
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F6FA;
  --white:#fff;
  --blue:#4F6EF7;
  --blue-light:#EEF1FE;
  --blue-dark:#3654d6;
  --text:#1A1D23;
  --muted:#8A8F9E;
  --border:#E4E6EE;
  --radius:14px;
  --shadow:0 2px 12px rgba(0,0,0,.07);
  --shadow-md:0 4px 24px rgba(0,0,0,.10);
}
html,body{min-height:100%;background:var(--bg);font-family:'Noto Sans TC',sans-serif;color:var(--text);font-size:15px}

/* ── Login ── */
#login-screen{
  min-height:100vh;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;background:var(--bg);
}
#google-login{
  width:52px;height:52px;border-radius:50%;border:2px solid var(--border);
  background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-md);transition:transform .15s,box-shadow .15s;
}
#google-login:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(0,0,0,.13)}
#google-login img{width:26px}
#auth-error{color:#e03e3e;font-size:.82rem;text-align:center;max-width:280px}

/* ── App ── */
#app{display:none;min-height:100vh}
.main{max-width:640px;margin:0 auto;padding:24px 16px 80px}

/* ── Top bar (no header, just floating controls) ── */
.top-bar{
  display:flex;align-items:center;gap:8px;margin-bottom:16px;
}
.search-wrap{flex:1;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
#search{
  width:100%;padding:9px 12px 9px 34px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--white);
  font-family:'Noto Sans TC',sans-serif;font-size:.88rem;color:var(--text);outline:none;
  transition:border-color .2s;
}
#search:focus{border-color:var(--blue)}
#search::placeholder{color:var(--muted)}
#user-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--border);cursor:pointer;flex-shrink:0}
#user-avatar:hover{border-color:var(--blue)}
#logout-btn{
  background:none;border:1.5px solid var(--border);color:var(--muted);
  padding:5px 12px;border-radius:20px;font-size:.78rem;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;transition:border-color .15s,color .15s;flex-shrink:0;
}
#logout-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ── Compose ── */
.compose{
  background:var(--white);border-radius:var(--radius);border:1.5px solid var(--border);
  padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow);
  transition:border-color .2s,box-shadow .2s;
}
.compose:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,110,247,.1)}
#quick-input{
  width:100%;border:none;outline:none;resize:none;overflow:hidden;
  font-family:'Noto Sans TC',sans-serif;font-size:.95rem;color:var(--text);
  background:transparent;line-height:1.65;min-height:40px;
}
#quick-input::placeholder{color:var(--muted)}
.compose-footer{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:10px}

/* ── Sync dot ── */
.sync-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--border);transition:background .3s;flex-shrink:0;
}
.sync-dot.syncing{background:var(--blue);animation:pulse .8s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

#submit-btn{
  background:var(--blue);color:#fff;border:none;border-radius:8px;
  padding:6px 16px;font-size:.85rem;font-weight:600;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;transition:background .15s;
}
#submit-btn:hover{background:var(--blue-dark)}

/* ── Cards ── */
#entry-list{display:flex;flex-direction:column;gap:10px}
.card{
  background:var(--white);border-radius:var(--radius);padding:16px 18px;
  border:1.5px solid var(--border);box-shadow:var(--shadow);
  animation:fadeUp .2s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card-text{font-size:.95rem;line-height:1.7;white-space:pre-wrap;color:var(--text)}
.card-actions{display:flex;gap:8px;margin-top:12px;opacity:0;transition:opacity .15s}
.card:hover .card-actions{opacity:1}
.btn-edit,.btn-del,.btn-save,.btn-cancel{
  background:none;border:1px solid var(--border);border-radius:6px;
  padding:3px 10px;font-size:.75rem;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;transition:background .15s,color .15s,border-color .15s;
}
.btn-edit{color:var(--blue)}
.btn-edit:hover{background:var(--blue-light);border-color:var(--blue)}
.btn-del{color:var(--muted)}
.btn-del:hover{background:#fef0f0;border-color:#e03e3e;color:#e03e3e}
.btn-save{color:#fff;background:var(--blue);border-color:var(--blue)}
.btn-save:hover{background:var(--blue-dark)}
.btn-cancel{color:var(--muted)}
.btn-cancel:hover{color:var(--text)}

/* ── Inline editor ── */
.card-edit{padding-top:2px}
.inline-editor{
  width:100%;border:none;outline:none;resize:none;overflow:hidden;
  font-family:'Noto Sans TC',sans-serif;font-size:.95rem;color:var(--text);
  background:transparent;line-height:1.7;min-height:40px;
}
.inline-actions{display:flex;gap:8px;margin-top:10px}

mark{background:#fff3b0;border-radius:2px;padding:0 1px}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:.9rem}

@media(max-width:480px){
  .main{padding:16px 12px 80px}
  .card-actions{opacity:1}
}
</style>
</head>
<body>

<div id="login-screen">
  <button id="google-login" title="以 Google 帳號登入">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
  </button>
  <p id="auth-error"></p>
</div>

<div id="app">
  <div class="main">

    <div class="top-bar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="搜尋…" autocomplete="off"/>
      </div>
      <img id="user-avatar" src="" alt="avatar" title=""/>
      <button id="logout-btn">登出</button>
    </div>

    <div class="compose">
      <textarea id="quick-input" placeholder="記下這次的感想… Enter 送出"></textarea>
      <div class="compose-footer">
        <div id="sync-dot" class="sync-dot"></div>
        <button id="submit-btn">記下來</button>
      </div>
    </div>

    <div id="entry-list"></div>
  </div>
</div>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
  });
}
</script>
</body>
</html>
