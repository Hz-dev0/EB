<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>經驗書 · Experience Journal</title>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import {
    getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
    getDocs, query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCBDKAOWQxc7oQz5IOhYVeaWpgbItp_glI",
    authDomain: "lumos-c6ccc.firebaseapp.com",
    projectId: "lumos-c6ccc",
    storageBucket: "lumos-c6ccc.firebasestorage.app",
    messagingSenderId: "914721288327",
    appId: "1:914721288327:web:6539b1770c23f007858822"
  };

  // ─── WHITELIST ─── add allowed Google emails here
  const WHITELIST = [
    // "you@gmail.com",
    // "friend@gmail.com"
  ];

  const COLLECTION_ROOT = "experience_journal"; // fixed collection name

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let allEntries = [];
  let currentUser = null;
  let editingId = null;

  // ─── Utils ───────────────────────────────────────────
  function entriesRef() {
    return collection(db, COLLECTION_ROOT);
  }

  function fmtDate(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString("zh-TW", { year: "numeric", month: "short", day: "numeric" });
  }

  function highlight(text, q) {
    if (!q) return escHtml(text);
    const safe = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const re = new RegExp(`(${safe})`, "gi");
    return escHtml(text).replace(re, '<mark>$1</mark>');
  }

  function escHtml(s) {
    return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ─── Fuzzy search ─────────────────────────────────────
  function searchEntries(entries, q) {
    if (!q.trim()) return entries;
    const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
    return entries.filter(e => {
      const haystack = [
        e.title, e.content, e.tags, e.category
      ].join(" ").toLowerCase();
      return terms.every(t => haystack.includes(t));
    }).sort((a, b) => {
      // score: title match first
      const scoreA = [a.title, a.tags].join(" ").toLowerCase().includes(terms[0]) ? 1 : 0;
      const scoreB = [b.title, b.tags].join(" ").toLowerCase().includes(terms[0]) ? 1 : 0;
      return scoreB - scoreA;
    });
  }

  // ─── Render ───────────────────────────────────────────
  function renderEntries(entries, q = "") {
    const list = document.getElementById("entry-list");
    if (!entries.length) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📖</div>
        <p>${q ? "找不到符合的記錄" : "還沒有任何記錄，開始記下第一條經驗吧！"}</p>
      </div>`;
      return;
    }
    list.innerHTML = entries.map(e => `
      <div class="entry-card" data-id="${e.id}">
        <div class="entry-dot"></div>
        <div class="entry-body">
          <div class="entry-header">
            <div class="entry-meta-left">
              ${e.category ? `<span class="category-badge">${escHtml(e.category)}</span>` : ""}
              <span class="entry-date">${fmtDate(e.createdAt)}</span>
            </div>
            <div class="entry-actions">
              <button class="btn-icon" onclick="window._editEntry('${e.id}')" title="編輯">✏️</button>
              <button class="btn-icon btn-danger" onclick="window._deleteEntry('${e.id}')" title="刪除">🗑️</button>
            </div>
          </div>
          <h3 class="entry-title">${highlight(e.title, q)}</h3>
          <p class="entry-content">${highlight(e.content, q)}</p>
          ${e.tags ? `<div class="entry-tags">${e.tags.split(",").map(t => `<span class="tag">${highlight(t.trim(), q)}</span>`).join("")}</div>` : ""}
          ${e.updatedAt && e.updatedAt.seconds !== (e.createdAt && e.createdAt.seconds)
            ? `<div class="entry-updated">更新於 ${fmtDate(e.updatedAt)}</div>` : ""}
        </div>
      </div>
    `).join("");
  }

  function renderStats(entries) {
    const el = document.getElementById("stats");
    const cats = [...new Set(entries.map(e => e.category).filter(Boolean))];
    el.textContent = `共 ${entries.length} 條記錄${cats.length ? `・${cats.length} 個類別` : ""}`;
  }

  // ─── Data ops ─────────────────────────────────────────
  async function loadEntries() {
    const q = query(entriesRef(), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    allEntries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    applySearch();
    renderStats(allEntries);
    populateCategoryFilter();
  }

  function applySearch() {
    const q = document.getElementById("search").value;
    const cat = document.getElementById("cat-filter").value;
    let results = allEntries;
    if (cat) results = results.filter(e => e.category === cat);
    results = searchEntries(results, q);
    renderEntries(results, q);
  }

  function populateCategoryFilter() {
    const sel = document.getElementById("cat-filter");
    const current = sel.value;
    const cats = [...new Set(allEntries.map(e => e.category).filter(Boolean))].sort();
    sel.innerHTML = `<option value="">全部類別</option>` +
      cats.map(c => `<option value="${escHtml(c)}" ${c === current ? "selected" : ""}>${escHtml(c)}</option>`).join("");
  }

  async function saveEntry() {
    const title = document.getElementById("f-title").value.trim();
    const content = document.getElementById("f-content").value.trim();
    const tags = document.getElementById("f-tags").value.trim();
    const category = document.getElementById("f-category").value.trim();
    if (!title || !content) {
      showToast("請填寫標題和內容", "error"); return;
    }
    const saveBtn = document.getElementById("save-btn");
    saveBtn.disabled = true;
    try {
      if (editingId) {
        await updateDoc(doc(db, COLLECTION_ROOT, editingId), {
          title, content, tags, category,
          updatedAt: serverTimestamp()
        });
        showToast("已更新記錄 ✓");
      } else {
        await addDoc(entriesRef(), {
          title, content, tags, category,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        showToast("已儲存記錄 ✓");
      }
      closeModal();
      await loadEntries();
    } catch (err) {
      showToast("儲存失敗：" + err.message, "error");
    }
    saveBtn.disabled = false;
  }

  window._editEntry = async (id) => {
    const e = allEntries.find(x => x.id === id);
    if (!e) return;
    editingId = id;
    document.getElementById("f-title").value = e.title || "";
    document.getElementById("f-content").value = e.content || "";
    document.getElementById("f-tags").value = e.tags || "";
    document.getElementById("f-category").value = e.category || "";
    document.getElementById("modal-heading").textContent = "編輯記錄";
    openModal();
  };

  window._deleteEntry = async (id) => {
    if (!confirm("確定要刪除這條記錄嗎？")) return;
    await deleteDoc(doc(db, COLLECTION_ROOT, id));
    showToast("已刪除");
    await loadEntries();
  };

  // ─── Modal ────────────────────────────────────────────
  function openModal() {
    document.getElementById("modal").classList.add("open");
    document.getElementById("f-title").focus();
  }
  function closeModal() {
    document.getElementById("modal").classList.remove("open");
    editingId = null;
    document.getElementById("entry-form").reset();
    document.getElementById("modal-heading").textContent = "新增記錄";
  }

  // ─── Toast ────────────────────────────────────────────
  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show " + type;
    setTimeout(() => t.className = "toast", 2500);
  }

  // ─── Auth ─────────────────────────────────────────────
  onAuthStateChanged(auth, user => {
    if (user) {
      if (WHITELIST.length > 0 && !WHITELIST.includes(user.email)) {
        signOut(auth);
        document.getElementById("auth-error").textContent =
          `帳號 ${user.email} 不在白名單內，請聯絡管理員。`;
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("app").style.display = "none";
        return;
      }
      currentUser = user;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app").style.display = "flex";
      document.getElementById("user-name").textContent = user.displayName || user.email;
      document.getElementById("user-avatar").src = user.photoURL || "";
      loadEntries();
    } else {
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("app").style.display = "none";
    }
  });

  // ─── Event bindings ───────────────────────────────────
  window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("google-login").addEventListener("click", async () => {
      document.getElementById("auth-error").textContent = "";
      try { await signInWithPopup(auth, provider); }
      catch (e) { document.getElementById("auth-error").textContent = "登入失敗：" + e.message; }
    });

    document.getElementById("logout-btn").addEventListener("click", () => signOut(auth));

    document.getElementById("new-entry-btn").addEventListener("click", () => {
      editingId = null;
      document.getElementById("entry-form").reset();
      document.getElementById("modal-heading").textContent = "新增記錄";
      openModal();
    });

    document.getElementById("close-modal").addEventListener("click", closeModal);
    document.getElementById("cancel-btn").addEventListener("click", closeModal);
    document.getElementById("modal").addEventListener("click", e => {
      if (e.target === document.getElementById("modal")) closeModal();
    });

    document.getElementById("save-btn").addEventListener("click", saveEntry);

    document.getElementById("search").addEventListener("input", applySearch);
    document.getElementById("cat-filter").addEventListener("change", applySearch);

    // Cmd/Ctrl+Enter to save
    document.addEventListener("keydown", e => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
        if (document.getElementById("modal").classList.contains("open")) saveEntry();
      }
    });
  });
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1B2340;
    --navy-light: #252f52;
    --navy-border: #2e3d6a;
    --cream: #F8F4EC;
    --cream-dim: #ede8dc;
    --ink: #1a1a2e;
    --ink-muted: #4a4f6a;
    --gold: #C9A84C;
    --gold-light: #e8c96a;
    --rust: #c0533a;
    --green: #2e8b57;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,.25);
  }

  html, body { height: 100%; background: var(--navy); font-family: 'Inter', sans-serif; color: var(--cream); }

  /* ── Login ── */
  #login-screen {
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    background: radial-gradient(ellipse at 40% 30%, #2a3666 0%, var(--navy) 70%);
  }
  .login-logo { font-family: 'Caveat', cursive; font-size: 3.2rem; color: var(--gold); letter-spacing: .02em; }
  .login-sub { font-size: .9rem; color: var(--cream-dim); opacity: .7; margin-top: -20px; }
  #google-login {
    display: flex; align-items: center; gap: 12px; padding: 14px 28px;
    background: var(--cream); color: var(--ink); border: none; border-radius: 50px;
    font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
  }
  #google-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.35); }
  #google-login img { width: 22px; }
  #auth-error { color: #ff7b7b; font-size: .85rem; text-align: center; max-width: 320px; }

  /* ── App shell ── */
  #app { display: none; flex-direction: column; height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--navy-light); border-bottom: 1px solid var(--navy-border);
    padding: 0 24px; height: 62px; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-brand { font-family: 'Caveat', cursive; font-size: 1.7rem; color: var(--gold); white-space: nowrap; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .user-chip { display: flex; align-items: center; gap: 8px; }
  #user-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); }
  #user-name { font-size: .82rem; color: var(--cream-dim); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #logout-btn { background: none; border: 1px solid var(--navy-border); color: var(--cream-dim);
    padding: 5px 12px; border-radius: 20px; font-size: .8rem; cursor: pointer; transition: background .15s; }
  #logout-btn:hover { background: var(--navy-border); }

  /* ── Main layout ── */
  .app-body { flex: 1; overflow: auto; padding: 28px 20px; max-width: 820px; margin: 0 auto; width: 100%; }

  /* ── Toolbar ── */
  .toolbar { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; align-items: center; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: .5; pointer-events: none; }
  #search {
    width: 100%; padding: 10px 14px 10px 38px; border-radius: 10px;
    background: var(--navy-light); border: 1px solid var(--navy-border);
    color: var(--cream); font-size: .93rem; outline: none;
    transition: border-color .2s;
  }
  #search:focus { border-color: var(--gold); }
  #search::placeholder { color: var(--ink-muted); }
  #cat-filter {
    padding: 10px 14px; border-radius: 10px; background: var(--navy-light);
    border: 1px solid var(--navy-border); color: var(--cream); font-size: .88rem;
    cursor: pointer; outline: none;
  }
  #cat-filter:focus { border-color: var(--gold); }
  #new-entry-btn {
    padding: 10px 20px; border-radius: 10px; background: var(--gold);
    border: none; color: var(--ink); font-weight: 600; font-size: .9rem;
    cursor: pointer; white-space: nowrap; transition: background .15s;
  }
  #new-entry-btn:hover { background: var(--gold-light); }
  #stats { font-size: .78rem; color: var(--ink-muted); width: 100%; }

  /* ── Timeline ── */
  #entry-list { display: flex; flex-direction: column; gap: 0; position: relative; padding-left: 22px; }
  #entry-list::before {
    content: ""; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px;
    background: linear-gradient(to bottom, var(--gold) 0%, var(--navy-border) 100%);
  }

  .entry-card {
    position: relative; display: flex; gap: 18px; padding-bottom: 22px;
    animation: fadeUp .3s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

  .entry-dot {
    position: absolute; left: -22px; top: 18px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--gold); border: 3px solid var(--navy);
    flex-shrink: 0; box-shadow: 0 0 0 2px var(--gold);
    transition: box-shadow .2s;
  }
  .entry-card:hover .entry-dot { box-shadow: 0 0 0 4px rgba(201,168,76,.35); }

  .entry-body {
    flex: 1; background: var(--cream); color: var(--ink); border-radius: var(--radius);
    padding: 16px 18px; box-shadow: var(--shadow); transition: transform .15s;
  }
  .entry-card:hover .entry-body { transform: translateX(3px); }

  .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .entry-meta-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .entry-date { font-size: .75rem; color: var(--ink-muted); }
  .category-badge {
    font-size: .7rem; font-weight: 600; padding: 2px 9px; border-radius: 20px;
    background: var(--navy); color: var(--gold); letter-spacing: .03em;
  }
  .entry-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .2s; }
  .entry-card:hover .entry-actions { opacity: 1; }
  .btn-icon {
    background: none; border: none; cursor: pointer; font-size: 1rem;
    padding: 4px 6px; border-radius: 6px; transition: background .15s;
  }
  .btn-icon:hover { background: rgba(0,0,0,.08); }
  .btn-danger:hover { background: rgba(192,83,58,.15); }

  .entry-title { font-family: 'Caveat', cursive; font-size: 1.45rem; font-weight: 700; margin-bottom: 6px; line-height: 1.2; }
  .entry-content { font-size: .88rem; line-height: 1.65; color: #2d2d40; white-space: pre-wrap; }
  .entry-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag {
    font-size: .72rem; padding: 3px 10px; border-radius: 20px;
    background: var(--cream-dim); color: var(--ink-muted); border: 1px solid #d6d0c4;
  }
  .entry-updated { font-size: .7rem; color: var(--ink-muted); margin-top: 8px; text-align: right; }
  mark { background: #ffe08a; border-radius: 2px; padding: 0 1px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--cream-dim); opacity: .5; }
  .empty-icon { font-size: 3rem; margin-bottom: 14px; }

  /* ── Modal ── */
  #modal {
    display: none; position: fixed; inset: 0; background: rgba(10,14,30,.7);
    backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; padding: 20px;
  }
  #modal.open { display: flex; }
  .modal-box {
    background: var(--navy-light); border: 1px solid var(--navy-border);
    border-radius: 18px; padding: 28px; width: 100%; max-width: 560px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  #modal-heading { font-family: 'Caveat', cursive; font-size: 1.6rem; color: var(--gold); }
  #close-modal { background: none; border: none; color: var(--cream-dim); font-size: 1.4rem; cursor: pointer; line-height: 1; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: .78rem; font-weight: 500; color: var(--cream-dim); margin-bottom: 6px; letter-spacing: .05em; text-transform: uppercase; }
  input[type=text], textarea {
    width: 100%; background: var(--navy); border: 1px solid var(--navy-border);
    color: var(--cream); border-radius: 10px; padding: 10px 14px;
    font-size: .93rem; font-family: 'Inter', sans-serif; outline: none;
    transition: border-color .2s; resize: vertical;
  }
  input[type=text]:focus, textarea:focus { border-color: var(--gold); }
  textarea { min-height: 130px; }
  .form-hint { font-size: .72rem; color: var(--ink-muted); margin-top: 4px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
  #cancel-btn { background: none; border: 1px solid var(--navy-border); color: var(--cream-dim);
    padding: 9px 20px; border-radius: 10px; cursor: pointer; font-size: .9rem; }
  #save-btn { background: var(--gold); border: none; color: var(--ink);
    padding: 9px 22px; border-radius: 10px; font-weight: 600; cursor: pointer;
    font-size: .9rem; transition: background .15s; }
  #save-btn:hover:not(:disabled) { background: var(--gold-light); }
  #save-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--ink); color: var(--cream); padding: 10px 22px;
    border-radius: 50px; font-size: .88rem; z-index: 999;
    transition: transform .3s; pointer-events: none; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #1e5c38; }
  .toast.error { background: #6b1a1a; }

  @media (max-width: 540px) {
    header { padding: 0 14px; }
    .app-body { padding: 18px 14px; }
    .modal-box { padding: 20px 16px; }
    #user-name { display: none; }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-logo">📔 經驗書</div>
  <div class="login-sub">記下每次的感想，下次做得更好</div>
  <button id="google-login">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
    以 Google 帳號登入
  </button>
  <p id="auth-error"></p>
</div>

<!-- App -->
<div id="app">
  <header>
    <div class="header-brand">📔 經驗書</div>
    <div class="header-right">
      <div class="user-chip">
        <img id="user-avatar" src="" alt="avatar" />
        <span id="user-name"></span>
      </div>
      <button id="logout-btn">登出</button>
    </div>
  </header>

  <div class="app-body">
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search" placeholder="搜尋標題、內容、標籤…" autocomplete="off" />
      </div>
      <select id="cat-filter"></select>
      <button id="new-entry-btn">＋ 新增記錄</button>
      <div id="stats"></div>
    </div>
    <div id="entry-list"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modal-heading">新增記錄</h2>
      <button id="close-modal">✕</button>
    </div>
    <form id="entry-form" onsubmit="return false">
      <div class="form-group">
        <label>標題 *</label>
        <input type="text" id="f-title" placeholder="這次做了什麼？" required />
      </div>
      <div class="form-group">
        <label>感想與心得 *</label>
        <textarea id="f-content" placeholder="記錄下這次的感想、遇到的問題、怎麼解決的…"></textarea>
      </div>
      <div class="form-group">
        <label>類別</label>
        <input type="text" id="f-category" placeholder="例如：工作、旅行、料理…" list="cat-suggestions" />
        <datalist id="cat-suggestions"></datalist>
      </div>
      <div class="form-group">
        <label>標籤</label>
        <input type="text" id="f-tags" placeholder="多個標籤以逗號分隔" />
        <div class="form-hint">例如：Vue, 前端, 好用</div>
      </div>
      <div class="modal-actions">
        <button id="cancel-btn" type="button">取消</button>
        <button id="save-btn" type="button">儲存（Ctrl+Enter）</button>
      </div>
    </form>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
  // Populate datalist for category autocomplete
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  // re-use the existing app (already initialized above)
  window.addEventListener("DOMContentLoaded", () => {
    document.addEventListener("entriesLoaded", (e) => {
      const cats = e.detail || [];
      const dl = document.getElementById("cat-suggestions");
      dl.innerHTML = cats.map(c => `<option value="${c}"></option>`).join("");
    });
  });
</script>

</body>
</html>
